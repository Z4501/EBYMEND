<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eBay Order Reconciliation & P&L</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="hero">
      <h1>eBay Order Reconciliation & P&amp;L Viewer</h1>
      <p>
        Upload eBay Orders CSV, ShipStation CSV, and Alto Statement PDF.
        This app matches everything by Order #.
      </p>
    </header>

    <section class="panel uploads">
      <div class="upload-card">
        <label for="ordersFile">eBay Orders CSV</label>
        <input type="file" id="ordersFile" accept=".csv" />
      </div>

      <div class="upload-card">
        <label for="shipFile">ShipStation CSV</label>
        <input type="file" id="shipFile" accept=".csv" />
      </div>

      <div class="upload-card">
        <label for="altoFile">Alto Statement PDF</label>
        <input type="file" id="altoFile" accept=".pdf" />
      </div>
    </section>

    <section class="panel controls">
      <button id="processBtn" class="btn primary">Process Files</button>
      <button id="exportBtn" class="btn" disabled>Export CSV</button>
    </section>

    <section class="panel">
      <h2>Summary</h2>
      <div id="summary" class="summary-grid"></div>
    </section>

    <section class="panel">
      <h2>Match Summary</h2>
      <div id="matchSummary" class="summary-grid"></div>
    </section>

    <section class="panel">
      <h2>Orders</h2>
      <div class="table-wrap">
        <table id="resultTable">
          <thead>
            <tr>
              <th>Order #</th>
              <th>Date</th>
              <th>SKU(s)</th>
              <th>Sold</th>
              <th>Buyer Ship</th>
              <th>Tax</th>
              <th>Ship Cost</th>
              <th>Parts Cost</th>
              <th>Est. eBay Fee</th>
              <th>Profit</th>
              <th>Margin</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs" type="module"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
